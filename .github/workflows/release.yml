name: Release - Build & Deploy

on:
  push:
    branches:
      - release
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha_short: ${{ steps.version.outputs.sha_short }}
      build_tag: ${{ steps.version.outputs.build_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "build_tag=prod-v${VERSION}-${SHA_SHORT}" >> $GITHUB_OUTPUT
          else
            VERSION=$(grep 'version:' config/version.yaml | awk '{print $2}')
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "build_tag=qa-${SHA_SHORT}" >> $GITHUB_OUTPUT
          fi

  e2e-test:
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: go test -v -race ./...

      - name: Build binary
        run: |
          BUILD_VERSION=${{ needs.setup.outputs.version }} \
          BUILD_GITHASH=${{ needs.setup.outputs.sha_short }} \
          BRANCH=${{ github.ref_name }} \
          ./build.sh

      - name: Start server
        run: |
          ./server &
          sleep 2

      - name: E2E - Test /helloworld
        run: |
          RESPONSE=$(curl -sf http://localhost:8080/helloworld)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"message":"Hello, World!"'

      - name: E2E - Test /health
        run: |
          RESPONSE=$(curl -sf http://localhost:8080/health)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"'

      - name: E2E - Test /version
        run: |
          RESPONSE=$(curl -sf http://localhost:8080/version)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"version"'

  build-and-push:
    runs-on: ubuntu-latest
    needs: [setup, e2e-test]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ needs.setup.outputs.build_tag }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=${{ needs.setup.outputs.version }}
            BUILD_GITHASH=${{ needs.setup.outputs.sha_short }}
            BRANCH=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
