name: Backport Hotfix to Main

on:
  pull_request:
    branches:
      - release
    types: [closed]

jobs:
  backport:
    # Only run on release branch, if PR was merged and title starts with 'fix(hotfix):'
    if: |
      github.base_ref == 'release' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.title, 'fix(hotfix):')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create backport branch
        run: |
          git checkout main
          git checkout -b backport/hotfix-${{ github.event.pull_request.number }}

      - name: Cherry-pick hotfix commits
        id: cherry_pick
        continue-on-error: true
        run: |
          # Cherry-pick the original commits from the hotfix branch.
          # Using merge_commit_sha fails because cherry-picking a merge commit
          # without -m flag produces an empty result. Instead, we cherry-pick
          # the actual commits from the PR's head branch.
          #
          # For single-commit hotfixes (typical), head.sha is the commit itself.
          # For multi-commit hotfixes, we cherry-pick the range.
          MERGE_BASE=$(git merge-base origin/release ${{ github.event.pull_request.head.sha }})
          COMMITS=$(git rev-list --reverse ${MERGE_BASE}..${{ github.event.pull_request.head.sha }})

          if [ -z "$COMMITS" ]; then
            echo "No commits to cherry-pick"
            exit 1
          fi

          for COMMIT in $COMMITS; do
            echo "Cherry-picking $(git log --oneline -1 $COMMIT)"
            git cherry-pick "$COMMIT"
          done

      - name: Check for conflicts
        id: check_conflicts
        run: |
          if [ "${{ steps.cherry_pick.outcome }}" == "failure" ]; then
            if [ -n "$(git status --porcelain)" ]; then
              echo "conflicts=true" >> $GITHUB_OUTPUT
              echo "⚠️ Cherry-pick had conflicts — committing with conflict markers"
              git add -A
              git commit --no-verify -m "chore: backport hotfix #${{ github.event.pull_request.number }} (conflicts need resolution)"
            else
              echo "conflicts=false" >> $GITHUB_OUTPUT
              echo "⚠️ Cherry-pick failed but no changes detected — hotfix may already be in main"
            fi
          else
            echo "conflicts=false" >> $GITHUB_OUTPUT
            echo "✅ Cherry-pick succeeded without conflicts"
          fi

      - name: Push backport branch
        run: |
          git push origin backport/hotfix-${{ github.event.pull_request.number }}

      - name: Create backport PR
        if: steps.check_conflicts.outputs.conflicts == 'false'
        id: create_pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Backport] ${context.payload.pull_request.title}`,
              head: `backport/hotfix-${context.payload.pull_request.number}`,
              base: 'main',
              body: `Automatic backport of hotfix #${context.payload.pull_request.number}\n\nOriginal PR: #${context.payload.pull_request.number}\n\n✅ Auto-merging (bypass approval enabled for github-actions bot).`
            });

            console.log(`Created backport PR #${pr.number}`);
            return pr;

      - name: Enable auto-merge
        if: steps.check_conflicts.outputs.conflicts == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = ${{ steps.create_pr.outputs.result }};

            try {
              await github.rest.pulls.updateBranch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number
              });
            } catch (error) {
              console.log('Branch already up to date or update not needed');
            }

            await github.graphql(`
              mutation($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $pullRequestId,
                  mergeMethod: SQUASH
                }) {
                  pullRequest {
                    autoMergeRequest {
                      enabledAt
                    }
                  }
                }
              }
            `, {
              pullRequestId: pr.node_id
            });

            console.log(`✅ Enabled auto-merge for backport PR #${pr.number} (will merge via bypass)`);

      - name: Create backport PR (conflicts - no auto-merge)
        if: steps.check_conflicts.outputs.conflicts == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = context.payload.pull_request.number;
            const title = context.payload.pull_request.title;

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Backport] ${title}`,
              head: `backport/hotfix-${prNum}`,
              base: 'main',
              body: [
                `Automatic backport of hotfix #${prNum}`,
                ``,
                `Original PR: #${prNum}`,
                ``,
                `⚠️ **This backport had conflicts during cherry-pick and requires manual resolution.**`,
                `Auto-merge is NOT enabled — please resolve conflicts and merge manually.`
              ].join('\n')
            });

            console.log(`⚠️ Created backport PR #${pr.number} (conflicts detected, no auto-merge)`);
