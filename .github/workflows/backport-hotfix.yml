name: Backport Hotfix to Main

on:
  pull_request:
    branches:
      - release
    types: [closed]

jobs:
  backport:
    # Only run on release branch, if PR was merged and title starts with 'fix(hotfix):'
    if: |
      github.base_ref == 'release' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.title, 'fix(hotfix):')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create backport branch
        run: |
          git checkout main
          git checkout -b backport/hotfix-${{ github.event.pull_request.number }}

      - name: Cherry-pick hotfix commits
        id: cherry_pick
        continue-on-error: true
        run: |
          # Cherry-pick the merge commit with -m 1 to apply the hotfix diff.
          #
          # Why -m 1: The merge commit has two parents. -m 1 tells git to
          # diff against the first parent (the release branch before the merge),
          # which gives us exactly the hotfix changes.
          #
          # Why merge_commit_sha: After the PR is merged, the head.sha commits
          # are reachable from release, so merge-base calculations produce empty
          # ranges. The merge commit is the only reliable reference.
          echo "Cherry-picking merge commit with -m 1"
          git cherry-pick -m 1 ${{ github.event.pull_request.merge_commit_sha }}

      - name: Check for conflicts
        id: check_conflicts
        run: |
          if [ "${{ steps.cherry_pick.outcome }}" == "failure" ]; then
            if [ -n "$(git status --porcelain)" ]; then
              echo "conflicts=true" >> $GITHUB_OUTPUT
              echo "⚠️ Cherry-pick had conflicts — committing with conflict markers"
              git add -A
              git commit --no-verify -m "chore: backport hotfix #${{ github.event.pull_request.number }} (conflicts need resolution)"
            else
              echo "conflicts=false" >> $GITHUB_OUTPUT
              echo "⚠️ Cherry-pick failed but no changes detected — hotfix may already be in main"
            fi
          else
            echo "conflicts=false" >> $GITHUB_OUTPUT
            echo "✅ Cherry-pick succeeded without conflicts"
          fi

      - name: Push backport branch
        run: |
          git push origin backport/hotfix-${{ github.event.pull_request.number }}

      - name: Create and merge backport PR
        if: steps.check_conflicts.outputs.conflicts == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = context.payload.pull_request.number;

            // Create the backport PR
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Backport] ${context.payload.pull_request.title}`,
              head: `backport/hotfix-${prNum}`,
              base: 'main',
              body: [
                `Automatic backport of hotfix #${prNum}`,
                ``,
                `Original PR: #${prNum}`,
                ``,
                `✅ Cherry-pick was clean — merging automatically.`
              ].join('\n')
            });
            console.log(`Created backport PR #${pr.number}`);

            // Merge it immediately — the code already passed E2E tests
            // in the hotfix PR to release, so no additional review needed.
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              merge_method: 'squash'
            });
            console.log(`✅ Merged backport PR #${pr.number}`);

      - name: Create backport PR (conflicts - no auto-merge)
        if: steps.check_conflicts.outputs.conflicts == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = context.payload.pull_request.number;
            const title = context.payload.pull_request.title;

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Backport] ${title}`,
              head: `backport/hotfix-${prNum}`,
              base: 'main',
              body: [
                `Automatic backport of hotfix #${prNum}`,
                ``,
                `Original PR: #${prNum}`,
                ``,
                `⚠️ **This backport had conflicts during cherry-pick and requires manual resolution.**`,
                `Auto-merge is NOT enabled — please resolve conflicts and merge manually.`
              ].join('\n')
            });

            console.log(`⚠️ Created backport PR #${pr.number} (conflicts detected, no auto-merge)`);
