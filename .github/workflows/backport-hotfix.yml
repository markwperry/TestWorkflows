name: Backport Hotfix to Main

on:
  pull_request:
    branches:
      - release
    types: [closed]

jobs:
  backport:
    # Only run if PR was merged and title starts with 'fix(hotfix):' (case-insensitive)
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'fix(hotfix):')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create backport branch
        run: |
          git checkout main
          git checkout -b backport/hotfix-${{ github.event.pull_request.number }}

      - name: Cherry-pick commits
        id: cherry_pick
        continue-on-error: true
        run: |
          git cherry-pick ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}

      - name: Check for conflicts
        id: check_conflicts
        run: |
          if [ "${{ steps.cherry_pick.outcome }}" == "failure" ]; then
            echo "conflicts=true" >> $GITHUB_OUTPUT
            echo "⚠️ Cherry-pick had conflicts"
            git cherry-pick --abort || true
          else
            echo "conflicts=false" >> $GITHUB_OUTPUT
            echo "✅ Cherry-pick succeeded without conflicts"
          fi

      - name: Push backport branch
        if: steps.check_conflicts.outputs.conflicts == 'false'
        run: |
          git push origin backport/hotfix-${{ github.event.pull_request.number }}

      - name: Create backport PR
        if: steps.check_conflicts.outputs.conflicts == 'false'
        id: create_pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Backport] ${context.payload.pull_request.title}`,
              head: `backport/hotfix-${context.payload.pull_request.number}`,
              base: 'main',
              body: `Automatic backport of hotfix #${context.payload.pull_request.number}\n\nOriginal PR: #${context.payload.pull_request.number}\n\n✅ Auto-merging (bypass approval enabled for github-actions bot).`
            });

            console.log(`Created backport PR #${pr.number}`);
            return pr;

      - name: Enable auto-merge
        if: steps.check_conflicts.outputs.conflicts == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = ${{ steps.create_pr.outputs.result }};

            // Update branch to ensure it's up to date
            try {
              await github.rest.pulls.updateBranch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number
              });
            } catch (error) {
              console.log('Branch already up to date or update not needed');
            }

            // Enable auto-merge using GraphQL
            await github.graphql(`
              mutation($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $pullRequestId,
                  mergeMethod: SQUASH
                }) {
                  pullRequest {
                    autoMergeRequest {
                      enabledAt
                    }
                  }
                }
              }
            `, {
              pullRequestId: pr.node_id
            });

            console.log(`✅ Enabled auto-merge for backport PR #${pr.number} (will merge via bypass)`);

      - name: Create manual backport issue
        if: steps.check_conflicts.outputs.conflicts == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Manual backport needed: ${context.payload.pull_request.title}`,
              body: `⚠️ **Automatic backport failed due to conflicts**\n\nHotfix PR #${context.payload.pull_request.number} could not be automatically backported to \`main\` due to merge conflicts.\n\n**Action Required:**\nPlease manually cherry-pick the changes:\n\`\`\`bash\ngit checkout main\ngit pull\ngit checkout -b backport/hotfix-${context.payload.pull_request.number}\ngit cherry-pick ${context.payload.pull_request.base.sha}..${context.payload.pull_request.head.sha}\n# Resolve conflicts\ngit push origin backport/hotfix-${context.payload.pull_request.number}\n\`\`\`\n\nThen create a PR from \`backport/hotfix-${context.payload.pull_request.number}\` to \`main\`.`,
              labels: ['hotfix', 'manual-backport-needed']
            });

            console.log('⚠️ Created issue for manual backport due to conflicts');
